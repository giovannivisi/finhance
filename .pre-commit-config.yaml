repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        files: '\.(ts|tsx|mts|cts|js|jsx|mjs|cjs|json|md|ya?ml)$'

      - id: prisma-format
        name: prisma format
        entry: pnpm --filter api exec prisma format --schema prisma/schema.prisma
        language: system
        pass_filenames: false
        files: '^apps/api/prisma/schema\.prisma$'

      - id: api-lint
        name: api lint
        entry: pnpm --filter api lint
        language: system
        pass_filenames: false
        files: '^apps/api/.*\.ts$'

      - id: api-tests
        name: api unit tests
        entry: pnpm --filter api test -- --runInBand
        language: system
        pass_filenames: false
        files: '^(apps/api/|packages/shared/).*\.(ts|js|json|mjs|prisma|sql)$'

      - id: web-lint
        name: web lint
        entry: pnpm --filter web lint
        language: system
        pass_filenames: false
        files: '^apps/web/.*\.(ts|tsx|mts|cts|js|jsx|mjs)$'

      - id: web-tests
        name: web tests
        entry: pnpm --filter web test
        language: system
        pass_filenames: false
        files: '^(apps/web/|packages/shared/).*\.(ts|tsx|mts|cts|js|jsx|mjs|json)$'
